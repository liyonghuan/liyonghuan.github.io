<main class="">
    <h1 class="page_name mb-3">项目</h1>
    <hr class="page-divider mb-4" />
    <article class="mod-archive">
        <p class="single_info mb-4">我在 <span id="repo-platform">Github</span> 上有 <span id="repo-count">0</span> 个项目</p>
        <div class="repo-content">
            <div class="repo-loading">
                <p>正在加载...</p>
            </div>
            <ul class="repo-list" id="repo-list" style="display: none;"></ul>
        </div>

</main>

<script>
(function() {
    // 支持两种配置方式（参考 pure 主题）：
    // 1. 新版配置：repository.platform + repository.username (或 repository.user)
    // 2. 旧版配置：github.username (向后兼容)
    var repoUser = 'liyonghuan';
    var repoType = 'github';
    
    // 检查配置
    if (!repoUser || repoUser.trim() === '') {
        document.querySelector('.repo-loading').style.display = 'none';
        document.querySelector('#repo-list').style.display = 'block';
        document.querySelector('#repo-list').innerHTML = 
            '<li class="text-secondary">请在根目录的 <code>_config.yml</code> 中配置仓库信息：<br>' +
            '<strong>新版配置（推荐）：</strong><br>' +
            '<pre style="background:#f9f9f9;padding:10px;border-radius:3px;overflow-x:auto;">repository:\n  username: "your-github-username"\n  platform: github</pre>' +
            '<strong>旧版配置（兼容）：</strong><br>' +
            '<pre style="background:#f9f9f9;padding:10px;border-radius:3px;overflow-x:auto;">github:\n  username: "your-github-username"</pre>' +
            '</li>';
        return;
    }
    
    // 设置平台显示
    document.getElementById('repo-platform').textContent = repoType === 'gitee' ? 'Gitee' : 'Github';
    
    // API URL
    var apiUrl = repoType === 'gitee' 
        ? 'https://gitee.com/api/v5/users/' + repoUser + '/repos?per_page=100&sort=updated&order=desc'
        : 'https://api.github.com/users/' + repoUser + '/repos?per_page=100&sort=updated&type=all';
    
    // 获取仓库数据
    fetch(apiUrl)
        .then(function(response) {
            if (!response.ok) {
                return response.json().then(function(err) {
                    throw new Error(err.message || 'HTTP ' + response.status);
                });
            }
            return response.json();
        })
        .then(function(data) {
            document.querySelector('.repo-loading').style.display = 'none';
            document.querySelector('#repo-list').style.display = 'block';
            
            // 检查是否是错误响应
            if (data && data.message) {
                document.querySelector('#repo-list').innerHTML = 
                    '<li class="text-secondary">错误: ' + data.message + '</li>';
                return;
            }
            
            if (data && Array.isArray(data) && data.length > 0) {
                // 更新计数
                document.getElementById('repo-count').textContent = data.length;
                
                // 排序：先按更新时间，再按 star 数（fork 项目权重减半）
                data.sort(function(a, b) {
                    return new Date(b.updated_at) - new Date(a.updated_at);
                }).sort(function(a, b) {
                    var aStar = a.stargazers_count || 0;
                    var bStar = b.stargazers_count || 0;
                    if (a.fork) aStar = aStar * 0.5;
                    if (b.fork) bStar = bStar * 0.5;
                    return bStar - aStar;
                });
                
                // 生成列表
                var html = '';
                data.forEach(function(repo) {
                    var description = repo.description || '';
                    var cloneUrl = repo.clone_url || repo.html_url || '';
                    var updatedAt = repo.updated_at ? repo.updated_at.substring(0, repo.updated_at.lastIndexOf('T')) : '';
                    var language = repo.language || '';
                    var stars = repo.stargazers_count || 0;
                    var forks = repo.forks_count || 0;
                    
                    html += '<li>';
                    html += '<div class="repo-item">';
                    html += '<div class="repo-header">';
                    html += '<a href="' + repo.html_url + '" target="_blank" rel="external nofollow noopener noreferrer" class="repo-title">' + (repo.full_name || repo.name) + '</a>';
                    if (repo.fork) {
                        html += '<span class="repo-fork-badge">Fork</span>';
                    }
                    html += '</div>';
                    if (description) {
                        html += '<p class="repo-description">' + description + '</p>';
                    }
                    html += '<div class="repo-meta">';
                    if (language) {
                        html += '<span class="repo-language">' + language + '</span>';
                    }
                    html += '<span class="repo-stars">★ ' + stars + '</span>';
                    html += '<span class="repo-forks">♢ ' + forks + '</span>';
                    if (updatedAt) {
                        html += '<span class="repo-updated">更新于 ' + updatedAt + '</span>';
                    }
                    html += '</div>';
                    html += '</div>';
                    html += '</li>';
                });
                
                document.querySelector('#repo-list').innerHTML = html;
            } else {
                document.querySelector('#repo-list').innerHTML = 
                    '<li class="text-secondary">暂无仓库项目</li>';
            }
        })
        .catch(function(error) {
            document.querySelector('.repo-loading').style.display = 'none';
            document.querySelector('#repo-list').style.display = 'block';
            document.querySelector('#repo-list').innerHTML = 
                '<li class="text-secondary">加载失败: ' + error.message + '<br>请刷新或稍后再试...</li>';
        });
})();
</script>
