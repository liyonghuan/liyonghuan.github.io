<h1 id="图片资源目录"><a href="#图片资源目录" class="headerlink" title="图片资源目录"></a>图片资源目录</h1><p>请在此目录放置以下文件：</p>
<ul>
<li><code>logo.png</code> - 网站 Logo（或根据主题配置中的 <code>logo</code> 路径放置）</li>
<li>其他文章或页面中使用的图片资源</li>
</ul>
<h2 id="注意事项"><a href="#注意事项" class="headerlink" title="注意事项"></a>注意事项</h2><ul>
<li>Logo 图片建议使用圆形头像样式，主题会自动添加 <code>border-radius: 50%</code> 样式</li>
<li>Logo 在首页显示为 120px 宽度，在其他页面显示为 28px 高度</li>
<li>图片路径在主题配置文件中设置</li>
</ul>
